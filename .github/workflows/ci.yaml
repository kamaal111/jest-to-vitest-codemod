name: CI

on:
  push:

concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Git - Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Use Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: 'pnpm'

      - name: Run quality checks
        run: pnpm quality

  test:
    name: Test
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Git - Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Use Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: 'pnpm'

      - name: Run tests
        run: pnpm test:cov

  example:
    name: Example App Transformation
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Git - Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Use Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install example app dependencies
        working-directory: example
        run: npm install

      - name: Type-check example app (before transformation)
        working-directory: example
        run: npm run type-check

      - name: Lint example app (before transformation)
        run: pnpm exec eslint --max-warnings 0 example

      - name: Run example tests with Jest (before transformation)
        working-directory: example
        run: npx jest

      - name: Clean example app dependencies (before codemod)
        working-directory: example
        run: rm -rf node_modules

      - name: Build codemod
        run: pnpm build

      - name: Run codemod on example app
        run: node dist/cli.js example

      - name: Install example app dependencies (after transformation)
        working-directory: example
        run: |
          npm install --save-dev vitest
          npm install

      - name: Type-check example app (after transformation)
        working-directory: example
        run: npm run type-check

      - name: Lint example app (after transformation)
        run: pnpm exec eslint --max-warnings 0 example

      - name: Run transformed tests
        working-directory: example
        run: npx vitest run
